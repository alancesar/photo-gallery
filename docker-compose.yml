version: "3"
services:
  postgres:
    image: postgres:13
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
  api:
    build: ./api
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      - postgres
  worker:
    build: ./worker
    env_file: .env
    depends_on:
      - minio
  frontend:
    build: ./frontend
    env_file: .env
    ports:
      - "5000:5000"
    depends_on:
      - api
  metadata:
    build: ./metadata
    env_file: .env
    environment:
      - MINIO_ENDPOINT=http://minio:9000
    ports:
      - "8081:8081"
    depends_on:
      - minio
  minio:
    image: minio/minio
    env_file: .env
    command: server /data
    ports:
      - "9000:9000"
    volumes:
      - minio-data:/data
volumes:
  minio-data:
  postgres-data:
